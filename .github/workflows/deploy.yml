name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/social-post-api:${{ github.sha }}

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /opt/social-post-api
            docker stop social-post-api || true
            docker rm social-post-api || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/social-post-api:${{ github.sha }}
            docker run -d \
              -p 80:8000 \
              --name social-post-api \
              --restart always \
              --env-file .env \
              ${{ secrets.DOCKERHUB_USERNAME }}/social-post-api:${{ github.sha }}